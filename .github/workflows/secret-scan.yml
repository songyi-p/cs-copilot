name: Secret scan

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  trufflehog:
    name: TruffleHog
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for leaked credentials
        uses: trufflesecurity/trufflehog@v3.95.2
        with:
          extra_args: --results=verified,unknown
